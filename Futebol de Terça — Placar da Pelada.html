<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Futebol de Terça — Placar da Pelada</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#0a1520;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px 10px 50px;font-family:system-ui,sans-serif}
.story{width:min(100%,420px);aspect-ratio:9/16;border-radius:24px;overflow:hidden;background:linear-gradient(180deg,#041d2a 0%,#062636 40%,#051a25 100%);color:#fff;box-shadow:0 20px 50px rgba(0,0,0,.5);display:flex;flex-direction:column;position:relative}
.glow{position:absolute;top:0;left:0;right:0;height:280px;background:radial-gradient(ellipse at top,rgba(50,180,255,.22),transparent);pointer-events:none}
.head{padding:18px 18px 12px;position:relative;z-index:1}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.brand img{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.25)}
.brand-t{font-size:22px;font-weight:900;line-height:1.05}
.brand-s{font-size:10px;color:#8be7ff;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.scores{display:grid;grid-template-columns:1fr 90px 1fr;gap:8px;align-items:center}
.team{background:linear-gradient(180deg,#eef2f5,#d5dde4);color:#0f172a;border-radius:14px;padding:10px 8px;text-align:center;border:2px solid #a8b6c4}
.ti{width:32px;height:32px;border-radius:50%;background:#1d4ed8;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;margin:0 auto 4px;border:2px solid #fff}
.tn{font-size:12px;font-weight:900;text-transform:uppercase;line-height:1}
.ts{font-size:36px;font-weight:900;line-height:1;margin-top:2px}
.final{display:flex;flex-direction:column;align-items:center;gap:4px}
.f1{background:linear-gradient(180deg,#2563eb,#1d4ed8);padding:10px 12px;border-radius:12px;font-size:18px;font-weight:900;border:1px solid rgba(255,255,255,.2)}
.f2{font-size:11px;color:#9bc5ff;font-weight:700}
.chips{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:10px}
.chip{background:#0e4256;border:1px solid #2d738e;color:#d8eff8;border-radius:999px;padding:4px 10px;font-size:9px;font-weight:900;text-transform:uppercase}
.body{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px 16px;flex:1;min-height:0;position:relative;z-index:1}
.lst{background:linear-gradient(180deg,rgba(8,52,70,.96),rgba(6,36,50,.92));border:1px solid #1d6278;border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
.lsth{padding:8px 10px;background:linear-gradient(180deg,rgba(80,210,255,.18),rgba(80,210,255,.05));border-bottom:1px solid #1d6278}
.lsth .a{font-size:12px;font-weight:900;text-transform:uppercase}
.lsth .b{font-size:9px;color:#8acbde;font-weight:700;margin-top:1px}
.rows{padding:6px;display:flex;flex-direction:column;gap:5px;overflow-y:auto;flex:1}
.prow{display:grid;grid-template-columns:34px 1fr auto;gap:6px;align-items:center;padding:5px 6px;border-radius:10px;background:rgba(255,255,255,.07);border:1px solid rgba(140,215,255,.1)}
.pav{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.2);background:#12303f}
.pnm{font-size:11px;font-weight:900;line-height:1.1;color:#fff}
.psm{font-size:9px;color:#8ecadb;margin-top:1px;font-weight:700}
.pg{font-size:17px;font-weight:900;color:#fff}
.empty{padding:16px 8px;text-align:center;color:#5a92a4;font-size:11px;font-weight:700}
.pitch{margin:0 16px 0;border-radius:12px;overflow:hidden;border:1px solid #2a6035;height:75px;position:relative;flex-shrink:0;background:repeating-linear-gradient(90deg,#2c7519 0 40px,#5bae17 40px 80px)}
.pitch svg{position:absolute;inset:0;width:100%;height:100%}
.foot{padding:6px 16px 14px;font-size:10px;color:#5b8799;font-weight:700;text-align:center;flex-shrink:0;position:relative;z-index:1}
.btn-baixar{margin-top:20px;width:min(100%,420px);padding:15px;border-radius:999px;border:none;background:linear-gradient(135deg,#27c0ff,#0d8fd3);color:#fff;font-weight:900;font-size:15px;cursor:pointer;box-shadow:0 6px 20px rgba(0,120,200,.3)}
.erro{color:#8be7ff;font-size:1.1rem;text-align:center;margin-top:80px;padding:20px}
</style>
</head>
<body>
<div id="root"></div>
<script>
var FAV="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='50' fill='%23122a36'/%3E%3Ccircle cx='50' cy='35' r='16' fill='%23cce0ec'/%3E%3Crect x='22' y='58' width='56' rx='12' height='24' fill='%23cce0ec'/%3E%3C/svg%3E";
var LOGO="https://cdn.tess.im/assets/uploads/0084ef06-7841-4192-bf7f-084cb90b3c7e.png";

function esc(s){var d=document.createElement('div');d.textContent=(s==null?'':String(s));return d.innerHTML;}
function fmtDate(iso){if(!iso)return'';var p=String(iso).slice(0,10).split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:iso;}
function photo(p){var u=(p&&(p.photoUrl||p.foto||p.photo))||'';return u?String(u).trim():FAV;}

function loadData(){
  // tenta ler do localStorage
  try{
    var sessStr=localStorage.getItem('ft_currentSession')||localStorage.getItem('currentSession')||localStorage.getItem('ft_session');
    var playStr=localStorage.getItem('ft_players')||localStorage.getItem('players');
    var sess=sessStr?JSON.parse(sessStr):null;
    var plays=playStr?JSON.parse(playStr):[];

    // tenta chaves alternativas para sessão
    if(!sess){
      // busca em todas as chaves ft_
      for(var i=0;i<localStorage.length;i++){
        var k=localStorage.key(i);
        if(k&&k.startsWith('ft_sess')){try{sess=JSON.parse(localStorage.getItem(k));}catch(e){}}
        if(sess)break;
      }
    }

    // tenta chaves alternativas para jogadores
    if(!plays||!plays.length){
      for(var i=0;i<localStorage.length;i++){
        var k=localStorage.key(i);
        if(k&&(k==='players'||k.endsWith('_players')||k==='ft_players')){
          try{var tmp=JSON.parse(localStorage.getItem(k));if(tmp&&tmp.length){plays=tmp;break;}}catch(e){}
        }
      }
    }

    return{session:sess,players:plays||[]};
  }catch(e){return{session:null,players:[]};}
}

function getStat(stats,pid){
  if(!stats)return{goals:0,assists:0,rating:null};
  var r=stats[pid]||stats[String(pid)]||{};
  return{goals:Number(r.goals)||0,assists:Number(r.assists)||0,rating:(r.rating===''||r.rating==null)?null:Number(r.rating)};
}

function getTeam(sess,players,pid){
  // tenta snapshot primeiro
  if(sess&&sess.teamSnapshot){
    var t=sess.teamSnapshot[pid]||sess.teamSnapshot[String(pid)];
    if(t)return t;
  }
  // fallback: time atual do jogador
  var p=(players||[]).find(function(x){return String(x.id)===String(pid);});
  return p&&p.team?p.team:null;
}

function buildRows(sess,players,letter){
  var arr=(players||[])
    .filter(function(p){return getTeam(sess,players,p.id)===letter;})
    .map(function(p){return{p:p,st:getStat(sess&&sess.stats,p.id)};})
    .filter(function(x){return x.st.goals>0;})
    .sort(function(a,b){return(b.st.goals-a.st.goals)||(b.st.assists-a.st.assists);});
  if(!arr.length)return'<div class="empty">Nenhum gol marcado.</div>';
  return arr.map(function(x){
    var g=x.st.goals,a=x.st.assists;
    return'<div class="prow">'
      +'<img class="pav" src="'+esc(photo(x.p))+'" onerror="this.src=''+FAV+''">'
      +'<div><div class="pnm">'+esc(x.p.name||'')+'</div>'
      +'<div class="psm">'+g+(g===1?' gol':' gols')+(a>0?' &bull; Ass '+a:'')+'</div></div>'
      +'<div class="pg">'+g+'&#9917;</div>'
      +'</div>';
  }).join('');
}

function render(){
  var root=document.getElementById('root');
  var d=loadData();
  var sess=d.session, plays=d.players;

  if(!sess){
    root.innerHTML='<div class="erro">Nenhuma pelada carregada.<br><br>Abra o sistema, carregue uma pelada e clique em Placar novamente.</div>';
    return;
  }

  var tA=localStorage.getItem('ft_teamName_A')||'Time A';
  var tB=localStorage.getItem('ft_teamName_B')||'Time B';
  var scA=Number((sess.score&&sess.score.A)||0);
  var scB=Number((sess.score&&sess.score.B)||0);
  var dt=fmtDate(sess.date);

  // chips
  var tg=0,art=null,crq=null;
  (plays||[]).forEach(function(p){
    var st=getStat(sess&&sess.stats,p.id);
    tg+=st.goals;
    if(st.goals>0&&(!art||st.goals>art.st.goals))art={p:p,st:st};
    if(st.rating!=null&&(!crq||st.rating>crq.st.rating))crq={p:p,st:st};
  });
  var chips='<span class="chip">'+esc(dt)+'</span>'
    +'<span class="chip">&#9917; '+tg+' gol'+(tg!==1?'s':'')+'</span>';
  if(art&&art.st.goals>0)chips+='<span class="chip">&#127941; '+esc(art.p.name)+' ('+art.st.goals+')</span>';
  if(crq&&crq.st.rating!=null)chips+='<span class="chip">&#11088; '+esc(crq.p.name)+' '+crq.st.rating+'</span>';

  root.innerHTML=
    '<div class="story" id="storyCard">'
      +'<div class="glow"></div>'
      +'<div class="head">'
        +'<div class="brand"><img src="'+LOGO+'" alt="" onerror="this.style.display='none'">'
          +'<div><div class="brand-t">Futebol de Ter&#231;a</div><div class="brand-s">Placar da Pelada</div></div></div>'
        +'<div class="scores">'
          +'<div class="team"><div class="ti">A</div><div class="tn">'+esc(tA)+'</div><div class="ts">'+scA+'</div></div>'
          +'<div class="final"><div class="f1">FINAL</div><div class="f2">'+esc(dt)+'</div></div>'
          +'<div class="team"><div class="ti">B</div><div class="tn">'+esc(tB)+'</div><div class="ts">'+scB+'</div></div>'
        +'</div>'
        +'<div class="chips">'+chips+'</div>'
      +'</div>'
      +'<div class="body">'
        +'<div class="lst"><div class="lsth"><div class="a">'+esc(tA)+'</div><div class="b">Marcadores</div></div><div class="rows">'+buildRows(sess,plays,'A')+'</div></div>'
        +'<div class="lst"><div class="lsth"><div class="a">'+esc(tB)+'</div><div class="b">Marcadores</div></div><div class="rows">'+buildRows(sess,plays,'B')+'</div></div>'
      +'</div>'
      +'<div class="pitch"><svg viewBox="0 0 700 180" preserveAspectRatio="none"><g fill="none" stroke="white" stroke-width="2.5" opacity="0.9"><rect x="16" y="10" width="668" height="160" rx="6"/><line x1="350" y1="10" x2="350" y2="170"/><circle cx="350" cy="90" r="28"/><circle cx="350" cy="90" r="2.5" fill="white"/><rect x="16" y="50" width="76" height="80"/><rect x="608" y="50" width="76" height="80"/></g></svg></div>'
      +'<div class="foot">'+esc(sess.notes||'Futebol de Ter&#231;a &#8226; gerado automaticamente')+'</div>'
    +'</div>'
    +'<button class="btn-baixar" onclick="baixar()">&#128229; Baixar imagem</button>';
}

async function baixar(){
  var card=document.getElementById('storyCard');
  if(!card)return;
  if(!window.html2canvas){
    var sc=document.createElement('script');
    sc.src='https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
    sc.onload=baixar;
    document.head.appendChild(sc);
    return;
  }
  var cv=await html2canvas(card,{scale:4,useCORS:true,backgroundColor:'#041d2a'});
  var a=document.createElement('a');
  a.href=cv.toDataURL('image/png');
  a.download='placar-story.png';
  a.click();
}

// carrega html2canvas antecipado
var sc=document.createElement('script');
sc.src='https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
document.head.appendChild(sc);

render();
</script>
</body>
</html>
